services:
  freeport:
    build: .
    container_name: freeport
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./plugins:/app/plugins
    environment:
      - FREEPORT_PORT=4000
      - FREEPORT_HOST=0.0.0.0
      # Set your API keys here or use a .env file
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - FREEPORT_ADMIN_API_KEY=${FREEPORT_ADMIN_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
